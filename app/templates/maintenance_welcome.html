<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome | Maintenance</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/00_theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/10_layout.css') }}">
    <script>
      (function() {
        var continueUrl = {{ continue_url | tojson }};
        var storageKey = {{ splash_storage_key | tojson }};
        var isMobile = false;

        try {
          isMobile = window.matchMedia("(max-width: 768px), (pointer: coarse)").matches;
        } catch (error) {
          isMobile = false;
        }

        try {
          if (window.sessionStorage.getItem(storageKey) === "1") {
            window.location.replace(continueUrl);
            return;
          }
        } catch (error) {
          // Storage access is optional; the timed redirect still works.
        }

        if (isMobile) {
          try {
            window.sessionStorage.setItem(storageKey, "1");
          } catch (error) {
            // Storage access is optional; immediate mobile redirect still works.
          }
          window.location.replace(continueUrl);
        }
      }());
    </script>
    <noscript>
      <meta http-equiv="refresh" content="5;url={{ continue_url }}">
    </noscript>
  </head>

  <body class="welcome-splash-page">
    <main class="welcome-splash" aria-labelledby="welcomeSplashTitle">
      <div class="welcome-splash__card">
        <div class="welcome-splash__logo-shell">
          <img
            src="{{ url_for('static', filename='img/full-size-logo.png') }}"
            class="welcome-splash__logo"
            alt="Exceed Maintenance logo"
            onerror="this.hidden = true; this.nextElementSibling.hidden = false;"
          >
          <div class="welcome-splash__logo-fallback" hidden role="img" aria-label="Maintenance logo unavailable">
            Maintenance
          </div>
        </div>

        <div class="welcome-splash__eyebrow">Exceed Lab Operations</div>
        <h1 class="welcome-splash__title" id="welcomeSplashTitle">Welcome to Exceed Maintenance</h1>
        <p class="welcome-splash__subtitle">Loading maintenance dashboard...</p>

        <div class="welcome-splash__progress" aria-hidden="true">
          <div class="welcome-splash__progress-fill"></div>
        </div>
      </div>
    </main>

    <noscript>
      <div class="welcome-splash__noscript">
        <a href="{{ continue_url }}">Continue</a>
      </div>
    </noscript>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        var continueUrl = {{ continue_url | tojson }};
        var storageKey = {{ splash_storage_key | tojson }};
        var isMobile = false;

        try {
          isMobile = window.matchMedia("(max-width: 768px), (pointer: coarse)").matches;
        } catch (error) {
          isMobile = false;
        }

        try {
          window.sessionStorage.setItem(storageKey, "1");
        } catch (error) {
          // Storage access is optional; the timed redirect still works.
        }

        if (isMobile) {
          window.location.replace(continueUrl);
          return;
        }

        window.setTimeout(function() {
          window.location.replace(continueUrl);
        }, 5000);
      });
    </script>
  </body>
</html>
